<div class="container">
    <h1>🐱 NutriCat – Cat Food Calculator</h1>
    <p class="trust">Based on veterinary nutrition guidelines</p>

    <div class="hero" id="hero"></div>

    <div class="toggle-row">
        <div class="toggle-container">
            <label id="darkModeLabel" for="darkToggle">Dark Mode</label>
            <div class="toggle-switch">
                <input type="checkbox" id="darkToggle" />
                <div class="toggle-thumb"></div>
            </div>
        </div>

        <div class="toggle-container">
            <label id="langLabel" for="langToggle">English</label>
            <div class="toggle-switch">
                <input type="checkbox" id="langToggle" />
                <div class="toggle-thumb"></div>
            </div>
        </div>
    </div>

    <label id="weightLabel"></label>
    <input type="range" id="weightRange" min="1" max="20" step="0.1" value="4.5">
    <input type="number" id="weight" step="0.1">

    <label id="typeLabel"></label>
    <select id="type">
        <option value="1.2" data-en="Neutered adult" data-pt="Adulto castrado"></option>
        <option value="1.4" data-en="Intact adult" data-pt="Adulto não castrado"></option>
        <option value="1.0" data-en="Inactive / Obese prone" data-pt="Inativo / propenso à obesidade"></option>
        <option value="0.8" data-en="Weight loss" data-pt="Perda de peso"></option>
        <option value="2.5" data-en="Kitten" data-pt="Filhote"></option>
    </select>

    <label id="productLabel"></label>
    <select id="foodSelect"></select>

    <label id="foodLabel"></label>
    <input type="range" id="foodRange" min="500" max="5000" step="10" value="3700">
    <input type="number" id="foodEnergy" min="500" max="5000" step="10">

    <div class="result" id="result"></div>

    <!-- Copy & Share Buttons -->
    <button id="copyResult"></button>

    <canvas id="shareCanvas" width="400" height="200" style="display:none;border-radius:12px;"></canvas>
    <button id="downloadImage"></button>
    <p class="share" id="shareText"></p>


    <!-- Feedback -->
    <div id="feedback">
        <p>What would help you more?</p>
        <button class="feedback-btn" data-answer="schedule">Feeding schedule</button>
        <button class="feedback-btn" data-answer="brands">Best food brands</button>
        <button class="feedback-btn" data-answer="weight">Weight loss plan</button>
    </div>
